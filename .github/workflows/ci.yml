name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            sidecar/package-lock.json

      - name: Install sidecar deps
        run: npm ci --prefix sidecar

      - name: Rust check
        run: cargo check --locked

      - name: Sidecar typecheck
        run: npx --prefix sidecar tsc --noEmit
